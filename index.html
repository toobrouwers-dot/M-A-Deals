<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&A Deals — Afgelopen week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a5c2e;
    --green-light: #e8f3ec;
    --green-mid: #2d7a45;
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.09);
    --text: #111;
    --muted: #666;
    --subtle: #999;
    --blue-bg: #e6f1fb;
    --blue-text: #185fa5;
    --amber-bg: #faeeda;
    --amber-text: #854f0b;
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2.5px solid var(--green);
    position: sticky;
    top: 0;
    z-index: 100;
    padding-top: var(--safe-top);
  }

  .header-inner {
    max-width: 780px;
    margin: 0 auto;
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo-area { display: flex; align-items: center; gap: 12px; }

  .logo-pill {
    background: var(--green);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 4px;
    letter-spacing: .4px;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    font-weight: 400;
  }

  .header-week {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }

  .refresh-link {
    background: none;
    border: 0.5px solid var(--green);
    border-radius: 20px;
    color: var(--green);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 14px;
    cursor: pointer;
    transition: all .15s;
    display: block;
    margin-top: 4px;
  }

  .refresh-link:hover { background: var(--green); color: #fff; }

  /* MAIN */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .stat-num {
    font-size: 26px;
    font-weight: 600;
    color: var(--green);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .filter-btn {
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }

  .filter-btn:hover { border-color: var(--green); color: var(--green); }
  .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* DEALS */
  .deals-list {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .deal-card {
    padding: 16px 20px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: background .12s;
    animation: fadeIn .3s ease both;
  }

  .deal-card:last-child { border-bottom: none; }
  .deal-card:hover { background: #fafaf8; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }

  .deal-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 8px;
  }

  .deal-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.35;
    flex: 1;
  }

  .deal-title strong { font-weight: 600; }

  .deal-value {
    font-size: 17px;
    font-weight: 600;
    color: var(--green);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .deal-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .pill {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 10px;
  }

  .pill-sector { background: var(--green-light); color: var(--green); }
  .pill-announced { background: var(--blue-bg); color: var(--blue-text); }
  .pill-completed { background: #eaf3de; color: #3b6d11; }
  .pill-pending { background: var(--amber-bg); color: var(--amber-text); }

  .deal-date {
    font-size: 12px;
    color: var(--subtle);
  }

  .deal-summary {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 8px;
  }

  .details-toggle {
    font-size: 12px;
    color: var(--green);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .details-toggle svg {
    transition: transform .2s;
    width: 14px;
    height: 14px;
  }

  .deal-card.open .details-toggle svg { transform: rotate(180deg); }

  .deal-details {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: #f7f7f5;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted);
    border-left: 2px solid var(--green);
  }

  .deal-card.open .deal-details { display: block; }

  .detail-row { margin-bottom: 6px; }
  .detail-row:last-child { margin-bottom: 0; }
  .detail-label { font-weight: 600; color: var(--text); }

  /* STATES */
  .loading-state, .error-state {
    padding: 48px 20px;
    text-align: center;
    color: var(--muted);
  }

  .loading-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin: 0 3px;
    animation: bounce .9s infinite ease-in-out;
  }

  .loading-dot:nth-child(2) { animation-delay: .15s; }
  .loading-dot:nth-child(3) { animation-delay: .3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: .4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  .loading-text {
    font-size: 15px;
    margin-bottom: 16px;
    color: var(--text);
  }

  .loading-sub {
    font-size: 13px;
    color: var(--subtle);
    margin-top: 14px;
  }

  .error-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .error-sub { font-size: 14px; margin-bottom: 16px; }

  .btn-retry {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 22px;
    cursor: pointer;
  }

  /* KEY FORM */
  .key-form {
    padding: 40px 24px;
    text-align: center;
  }

  .key-form-text {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .key-input {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 0 auto 16px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color .15s;
  }

  .key-input:focus { border-color: var(--green); }

  .key-change-btn {
    background: none;
    border: none;
    color: var(--subtle);
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    padding: 2px 0;
    display: block;
    margin-top: 2px;
  }

  .key-change-btn:hover { color: var(--green); }

  /* FOOTER */
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--subtle);
    padding: 24px 20px;
  }

  @media (max-width: 500px) {
    .header-title { display: none; }
    .stat-num { font-size: 22px; }
    .deal-value { font-size: 15px; }
    .deal-title { font-size: 15px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-pill">M&amp;A</div>
      <div class="header-title">Overnames &amp; fusies</div>
    </div>
    <div class="header-week">
      <div id="week-range">Afgelopen 7 dagen</div>
      <button class="refresh-link" onclick="fetchDeals()">↻ Vernieuwen</button>
      <button class="key-change-btn" onclick="clearKey();showKeyForm(null)">API-sleutel</button>
    </div>
  </div>
</header>

<main>
  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-card">
      <div class="stat-num" id="stat-count">—</div>
      <div class="stat-label">Deals</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Totale waarde</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-sectors">—</div>
      <div class="stat-label">Sectoren</div>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar" style="display:none"></div>

  <div class="deals-list" id="deals-list">
    <div class="loading-state">
      <div class="loading-text">Deals ophalen via AI...</div>
      <div>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
      <div class="loading-sub">Claude zoekt de laatste M&amp;A-nieuws op</div>
    </div>
  </div>
</main>

<footer>
  Data via Gemini AI (gratis) of Claude AI (betaald) met web search &nbsp;·&nbsp; Bijgewerkt bij elke refresh
</footer>

<script>
let allDeals = [];
let activeFilter = 'all';
const API_KEY_STORAGE = 'ma_deals_api_key';
const GEMINI_KEY_STORAGE = 'ma_deals_gemini_key';

function getStoredKey() {
  return localStorage.getItem(API_KEY_STORAGE) || '';
}

function saveKey(key) {
  localStorage.setItem(API_KEY_STORAGE, key.trim());
}

function clearKey() {
  localStorage.removeItem(API_KEY_STORAGE);
  localStorage.removeItem(GEMINI_KEY_STORAGE);
}

function getProvider() {
  if (localStorage.getItem(API_KEY_STORAGE)) return 'anthropic';
  if (localStorage.getItem(GEMINI_KEY_STORAGE)) return 'gemini';
  return 'none';
}

function showKeyForm(errorMsg) {
  const list = document.getElementById('deals-list');
  document.getElementById('stats-row').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'none';
  list.innerHTML =
    '<div class="key-form">' +
      (errorMsg ? '<div class="error-title" style="margin-bottom:12px;color:#c0392b">' + errorMsg + '</div>' : '') +
      '<div style="margin-bottom:20px;padding:16px;border:1px solid #c8e6c9;border-radius:10px;background:#f1f8e9">' +
        '<div style="font-size:13px;font-weight:600;color:#2e7d32;margin-bottom:6px">Gratis — Google Gemini API</div>' +
        '<div class="key-form-text" style="text-align:left;margin-bottom:10px">Maak een gratis API-sleutel aan via <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:#2e7d32">Google AI Studio</a>. Geen creditcard vereist.</div>' +
        '<input id="gemini-key-input" type="password" placeholder="AIza..." class="key-input" style="margin:0 0 10px" onkeydown="if(event.key===\'Enter\')submitGeminiKey()" />' +
        '<button class="btn-retry" onclick="submitGeminiKey()">Opslaan &amp; laden</button>' +
      '</div>' +
      '<div style="font-size:12px;color:var(--subtle);margin:16px 0">— of —</div>' +
      '<div>' +
        '<div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px">Betaald — Anthropic Claude API</div>' +
        '<input id="key-input" type="password" placeholder="sk-ant-..." class="key-input" onkeydown="if(event.key===\'Enter\')submitKey()" />' +
        '<button class="btn-retry" style="background:var(--muted)" onclick="submitKey()">Opslaan &amp; laden</button>' +
      '</div>' +
    '</div>';
  const input = document.getElementById('gemini-key-input');
  if (input) input.focus();
}

function submitKey() {
  const input = document.getElementById('key-input');
  const key = input ? input.value.trim() : '';
  if (!key) return;
  saveKey(key);
  fetchDeals();
}

function submitGeminiKey() {
  const input = document.getElementById('gemini-key-input');
  const key = input ? input.value.trim() : '';
  if (!key) return;
  localStorage.setItem(GEMINI_KEY_STORAGE, key);
  fetchDeals();
}

function getWeekRange() {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  const fmt = d => d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
  return fmt(monday) + ' – ' + fmt(now) + ' ' + now.getFullYear();
}

function formatValue(v) {
  if (!v) return '—';
  const clean = String(v).replace(/[^0-9.]/g, '');
  const n = parseFloat(clean);
  if (isNaN(n)) return v;
  if (n >= 1000) return '$' + (n / 1000).toFixed(1) + 'T';
  if (n >= 1) return '$' + n.toFixed(1) + 'B';
  return v;
}

function statusPillClass(s) {
  if (!s) return 'pill-announced';
  const sl = s.toLowerCase();
  if (sl.includes('afger') || sl.includes('compl') || sl.includes('close')) return 'pill-completed';
  if (sl.includes('beh') || sl.includes('pend') || sl.includes('loop')) return 'pill-pending';
  return 'pill-announced';
}

function filterDeals(sector, btn) {
  activeFilter = sector;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = sector === 'all' ? allDeals : allDeals.filter(d => d.sector === sector);
  renderDeals(filtered);
}

function buildFilters(deals) {
  const sectors = [...new Set(deals.map(d => d.sector))];
  const bar = document.getElementById('filter-bar');
  bar.style.display = 'flex';
  bar.innerHTML =
    '<button class="filter-btn active" onclick="filterDeals(\'all\',this)">Alle (' + deals.length + ')</button>' +
    sectors.map(s => {
      const count = deals.filter(d => d.sector === s).length;
      return '<button class="filter-btn" onclick="filterDeals(\'' + s + '\',this)">' + s + ' (' + count + ')</button>';
    }).join('');
}

function updateStats(deals) {
  let totalB = 0;
  deals.forEach(d => {
    if (!d.value) return;
    const n = parseFloat(String(d.value).replace(/[^0-9.]/g, ''));
    if (!isNaN(n)) totalB += n;
  });
  document.getElementById('stat-count').textContent = deals.length;
  document.getElementById('stat-total').textContent = totalB > 0 ? '$' + Math.round(totalB) + 'B' : '—';
  document.getElementById('stat-sectors').textContent = new Set(deals.map(d => d.sector)).size;
  document.getElementById('stats-row').style.display = 'grid';
}

function renderDeals(deals) {
  const list = document.getElementById('deals-list');
  if (!deals.length) {
    list.innerHTML = '<div class="error-state"><div class="error-title">Geen resultaten</div><div class="error-sub">Geen deals gevonden voor dit filter.</div></div>';
    return;
  }

  list.innerHTML = deals.map((d, i) => {
    const advisors = d.advisors ? '<div class="detail-row"><span class="detail-label">Adviseurs: </span>' + d.advisors + '</div>' : '';
    const rationale = d.rationale ? '<div class="detail-row"><span class="detail-label">Strategie: </span>' + d.rationale + '</div>' : '';
    return '<div class="deal-card" style="animation-delay:' + (i * 0.06) + 's" onclick="this.classList.toggle(\'open\')">' +
      '<div class="deal-top">' +
        '<div class="deal-title"><strong>' + d.buyer + '</strong> neemt <strong>' + d.target + '</strong> over</div>' +
        '<div class="deal-value">' + formatValue(d.value) + '</div>' +
      '</div>' +
      '<div class="deal-meta">' +
        '<span class="pill pill-sector">' + d.sector + '</span>' +
        '<span class="pill ' + statusPillClass(d.status) + '">' + d.status + '</span>' +
        '<span class="deal-date">' + d.date + '</span>' +
      '</div>' +
      '<div class="deal-summary">' + d.summary + '</div>' +
      '<button class="details-toggle" onclick="event.stopPropagation();this.closest(\'.deal-card\').classList.toggle(\'open\')">' +
        'Meer details ' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</button>' +
      '<div class="deal-details">' + advisors + rationale + '</div>' +
    '</div>';
  }).join('');
}

async function fetchDeals() {
  const provider = getProvider();
  if (provider === 'anthropic') return fetchViaAnthropic();
  if (provider === 'gemini')   return fetchViaGemini();
  showKeyForm(null);
}

const SYSTEM_PROMPT = 'Je bent een M&A data-analist. Zoek de meest recente M&A deals van de afgelopen 7 dagen.\nReturn ONLY a raw JSON array, no markdown, no backticks, no explanation.\nEach object must have: buyer, target, value (number in billions USD as string e.g. "4.2"), sector (1-2 words NL), status (Aangekondigd|In behandeling|Afgerond), date (dag maand in Dutch), summary (2 sentences in Dutch), advisors (comma-separated bank names), rationale (1 sentence in Dutch).\nReturn 6-8 deals. ONLY the JSON array.';
const USER_MESSAGE = 'Geef me de grootste M&A deals van de afgelopen 7 dagen. Zoek dit op en return alleen een JSON array.';

function showLoadingState(aiName) {
  const list = document.getElementById('deals-list');
  document.getElementById('stats-row').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'none';
  document.getElementById('week-range').textContent = getWeekRange();
  list.innerHTML =
    '<div class="loading-state">' +
      '<div class="loading-text">Deals ophalen via AI...</div>' +
      '<div><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>' +
      '<div class="loading-sub">' + aiName + ' zoekt de laatste M&amp;A-nieuws op</div>' +
    '</div>';
}

function showErrorState(list) {
  list.innerHTML =
    '<div class="error-state">' +
      '<div class="error-title">Kon deals niet laden</div>' +
      '<div class="error-sub">Controleer je internetverbinding en probeer het opnieuw.</div>' +
      '<button class="btn-retry" onclick="fetchDeals()">Opnieuw proberen</button>' +
    '</div>';
}

function parseDealsFromText(text) {
  text = text.trim();
  const start = text.indexOf('[');
  const end = text.lastIndexOf(']');
  if (start === -1 || end === -1) throw new Error('No JSON array');
  return JSON.parse(text.slice(start, end + 1));
}

async function fetchViaAnthropic() {
  const apiKey = getStoredKey();
  const list = document.getElementById('deals-list');
  showLoadingState('Claude');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: USER_MESSAGE }]
      })
    });

    if (resp.status === 401) {
      clearKey();
      showKeyForm('API-sleutel ongeldig of verlopen. Probeer opnieuw.');
      return;
    }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const data = await resp.json();
    let text = '';
    for (const block of (data.content || [])) {
      if (block.type === 'text') text += block.text;
    }

    const parsed = parseDealsFromText(text);
    allDeals = parsed;
    buildFilters(allDeals);
    updateStats(allDeals);
    renderDeals(allDeals);

  } catch (err) {
    showErrorState(list);
  }
}

async function fetchViaGemini() {
  const apiKey = localStorage.getItem(GEMINI_KEY_STORAGE);
  const list = document.getElementById('deals-list');
  showLoadingState('Gemini AI');

  try {
    const resp = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ role: 'user', parts: [{ text: USER_MESSAGE }] }],
          tools: [{ google_search: {} }]
        })
      }
    );

    if (resp.status === 400 || resp.status === 403) {
      localStorage.removeItem(GEMINI_KEY_STORAGE);
      showKeyForm('Gemini API-sleutel ongeldig of verlopen. Probeer opnieuw.');
      return;
    }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const data = await resp.json();
    const text = (data.candidates?.[0]?.content?.parts?.[0]?.text) || '';

    const parsed = parseDealsFromText(text);
    allDeals = parsed;
    buildFilters(allDeals);
    updateStats(allDeals);
    renderDeals(allDeals);

  } catch (err) {
    showErrorState(list);
  }
}

fetchDeals();
</script>
</body>
</html>
